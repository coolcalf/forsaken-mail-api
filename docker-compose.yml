services:
  forsaken-mail-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forsaken-mail-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "25:25"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
